<section id="experience" class="section-padding bg-cream">
    <div class="container">
        <div class="row align-items-center mb-5 fade-in">
            <div class="col-lg-6">
                <h6 class="text-gold text-uppercase ls-2 mb-2 fw-semibold">The A-Z Journey</h6>
                <h2 class="display-5 text-charcoal">How We Bring Your Vision to Life</h2>
            </div>
            <div class="col-lg-6">
                <p class="text-slate high-whitespace mb-0">Our structured approach ensures every detail is meticulously
                    planned and flawlessly executed, leaving you free to enjoy your special day.</p>
            </div>
        </div>

        <div class="timeline-wrapper">
            <div class="row g-0">
                <div *ngFor="let step of steps; let i = index" class="col-md-3 timeline-item fade-in"
                    [style.animation-delay]="i * 0.2 + 's'">
                    <div class="timeline-card p-4 text-center">
                        <div class="timeline-number display-font text-gold mb-3">{{ i + 1 | number:'2.0' }}</div>
                        <div class="timeline-icon-box mb-4">
                            <lucide-icon [img]="step.icon" class="text-charcoal" size="32"></lucide-icon>
                        </div>
                        <h4 class="h5 mb-3 text-charcoal">{{ step.title }}</h4>
                        <p class="text-slate small high-whitespace">{{ step.description }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
