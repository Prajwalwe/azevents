<section class="hero-section d-flex align-items-center bg-cream">
    <div class="container">
        <div class="row align-items-center g-5">
            <div class="col-lg-6 fade-in">
                <h6 class="text-gold text-uppercase ls-2 mb-3 fw-semibold">Premier Event Management</h6>
                <h1 class="display-3 mb-4 text-charcoal lh-1">From Rituals to Receptions: Your Full-Service Event
                    Partners.</h1>
                <p class="lead text-slate mb-5 high-whitespace">Comprehensive planning for life's most sacred and
                    celebrated milestones. We bridge tradition with modern elegance.</p>
                <div class="d-flex flex-sm-row flex-column gap-3">
                    <a href="#services" class="btn btn-premium d-inline-flex align-items-center justify-content-center">
                        Explore Services <lucide-icon [img]="ChevronRightIcon" size="18" class="ms-2"></lucide-icon>
                    </a>
                    <a href="#booking" class="btn btn-outline-premium">Get a Quote</a>
                </div>
            </div>
            <div class="col-lg-6 fade-in">
                <div class="hero-image-wrapper p-3">
                    <img src="assets/images/hero.png" alt="Elegant Event Setup" class="img-fluid hero-image shadow-lg">
                    <div class="experience-badge bg-charcoal text-white p-4 d-none d-md-block">
                        <span class="fs-1 fw-bold gold-text">15+</span>
                        <small class="d-block text-uppercase ls-1">Years of Excellence</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
